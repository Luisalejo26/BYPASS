name: Build Tweat
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      -name: Setup Theos
       uses: theos/setup-theos@master

      -name:Build Package
       uses: make package FINALPACKAGE=1

      -name: Upload Artifact
       uses: actions/upload-artifact@v4
       with:
         name: MiTweak-Build
         path: packages/*.deb
